<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Background Space Gradient -->
    <linearGradient id="steelBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1329"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <!-- Metallic Shield Edge Gradient -->
    <linearGradient id="shieldBorder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cbd5e1"/>
      <stop offset="35%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>

    <!-- Corporate Premium Amber/Gold Gradient (Symbolizes High Value, Authority) -->
    <linearGradient id="cyberGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>

    <!-- Sleek Tech Blue Gradient for inner shield brain -->
    <linearGradient id="techBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>

    <!-- Holographic Glow Filter -->
    <filter id="holoGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Main Dark Card Canvas -->
  <rect width="256" height="256" rx="56" fill="url(#steelBg)" />

  <!-- Shield Base Contour (Heavy Enterprise Shield) -->
  <!-- Mathematically perfect bezier curve representing absolute defense -->
  <g filter="drop-shadow(0px 8px 16px rgba(0, 0, 0, 0.45))">
    <!-- Outer Shield Border -->
    <path d="M 128,32 
             C 180,32 208,44 208,44 
             L 208,124 
             C 208,188 128,224 128,224 
             C 128,224 48,188 48,124 
             L 48,44 
             C 48,44 76,32 128,32 Z" 
          fill="url(#shieldBorder)" />

    <!-- Inner Shield Plate -->
    <path d="M 128,38 
             C 174,38 198,48 198,48 
             L 198,120 
             C 198,178 128,212 128,212 
             C 128,212 58,178 58,120 
             L 58,48 
             C 58,48 82,38 128,38 Z" 
          fill="#0f172a" />
  </g>

  <!-- Left Side: RAG Cognitive Brain Lattice (The Tech/Mind element) -->
  <!-- High precision circular elements and connecting lines representing deep search -->
  <g opacity="0.85">
    <!-- Connecting neural pathways -->
    <path d="M 112,72 L 80,92 L 80,128 L 96,156 L 112,140 M 80,128 L 112,112 M 80,92 L 112,112 M 96,156 L 112,112" 
          stroke="url(#techBlue)" stroke-width="2.5" fill="none" stroke-linecap="round" />
    
    <!-- Cognitive nodes -->
    <circle cx="112" cy="72" r="4.5" fill="#3b82f6" />
    <circle cx="80" cy="92" r="5" fill="#60a5fa" />
    <circle cx="80" cy="128" r="4" fill="#3b82f6" />
    <circle cx="96" cy="156" r="5.5" fill="#2563eb" />
    <circle cx="112" cy="140" r="4" fill="#1d4ed8" />
    <circle cx="112" cy="112" r="6" fill="#60a5fa" filter="url(#holoGlow)" />
  </g>

  <!-- Right Side: Precise Security Lock/Key Dial (The Safety/Vault element) -->
  <g transform="translate(156, 114)">
    <!-- Vault door lock wheel outer ring -->
    <circle cx="0" cy="0" r="32" fill="none" stroke="url(#cyberGold)" stroke-width="3" />
    <circle cx="0" cy="0" r="26" fill="none" stroke="rgba(251, 191, 36, 0.15)" stroke-width="1.5" stroke-dasharray="4 2" />
    
    <!-- Lock Spokes (Mechanical vault elements) -->
    <g stroke="url(#cyberGold)" stroke-width="2.5" stroke-linecap="round">
      <line x1="0" y1="-32" x2="0" y2="-22" />
      <line x1="0" y1="22" x2="0" y2="32" />
      <line x1="-32" y1="0" x2="-22" y2="0" />
      <line x1="22" y1="0" x2="32" y2="0" />
      <line x1="-22" y1="-22" x2="-15" y2="-15" />
      <line x1="15" y1="15" x2="22" y2="22" />
      <line x1="22" y1="-22" x2="15" y2="-15" />
      <line x1="-15" y1="15" x2="-22" y2="22" />
    </g>

    <!-- Lock inner solid core -->
    <circle cx="0" cy="0" r="14" fill="url(#steelBg)" stroke="url(#cyberGold)" stroke-width="2" />
    <!-- Golden focal center -->
    <circle cx="0" cy="0" r="5" fill="#fbbf24" filter="url(#holoGlow)" />
  </g>

  <!-- Central Vertical Divide - Laser Light Beam -->
  <!-- Seamlessly dividing and bridging Mind and Vault on the shield -->
  <line x1="128" y1="52" x2="128" y2="198" stroke="#38bdf8" stroke-width="1.5" opacity="0.35" stroke-dasharray="8 4" />

  <!-- Shield Top Crown/Emblem Accent (Futuristic military-grade crest piece) -->
  <path d="M 112,20 L 128,10 L 144,20 L 128,26 Z" fill="url(#cyberGold)" />
  
  <!-- "SOVEREIGN DATA" - Solid padlock shape at shield center bottom -->
  <g transform="translate(128, 178)">
    <rect x="-10" y="-4" width="20" height="15" rx="3" fill="url(#cyberGold)" />
    <path d="M -6,-4 L -6,-10 C -6,-14 6,-14 6,-10 L 6,-4" fill="none" stroke="url(#cyberGold)" stroke-width="2.5" />
    <!-- Precise lock dot -->
    <circle cx="0" cy="3.5" r="2.5" fill="#0f172a" />
  </g>
</svg>